<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Physics Cube Demo</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b1014;
      color: #f7fbf8;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      background: #0b1014;
    }

    main {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
    }

    header,
    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 58px;
      padding: 12px 18px;
      background: rgba(5, 9, 12, 0.78);
      border-color: rgba(255, 255, 255, 0.12);
    }

    header {
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    footer {
      border-top: 1px solid rgba(255, 255, 255, 0.12);
    }

    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    button {
      min-width: 84px;
      height: 36px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      background: #f5faf6;
      color: #0c120f;
      font: inherit;
      font-size: 14px;
      font-weight: 650;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #status,
    #summary {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.35;
      color: #d1dfd6;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Physics Cube Demo</h1>
      <div class="controls">
        <button id="kick-cube" type="button">Kick</button>
        <button id="reset-cube" type="button">Reset</button>
      </div>
    </header>
    <canvas id="cube-canvas" aria-label="Physics cube render"></canvas>
    <footer>
      <div id="status">loading physics composition</div>
      <div id="summary">snapshot pending</div>
    </footer>
  </main>

  <script type="module">
    import {
      createPhysicsCubeState,
      snapshotPhysicsCube,
      tickPhysicsCube
    } from "./kits/physics-cube-object-kit.mjs";
    import {
      createPrimitiveCubeMesh
    } from "./kits/primitive-cube-object-kit.mjs";

    const fallbackDescriptor = {
      primitive: {
        id: "physics-cube",
        label: "Physics Cube",
        size: 0.95,
        position: [0, 2.9, 0],
        rotation: [0, 24, 0],
        spinAxis: [0.4, 1, 0.2],
        angularVelocity: 72,
        material: {
          color: "#58d68d",
          edgeColor: "#10251a",
          highlightColor: "#ddffe9",
          sideColor: "#2faf6a"
        }
      },
      physics: {
        velocity: [0.9, 0, 0],
        resetVelocity: [0.9, 0, 0],
        gravity: [0, -9.8, 0],
        floorY: 0,
        restitution: 0.62,
        damping: 0.997,
        floorFriction: 0.78,
        maxSpeed: 18
      }
    };

    const canvas = document.getElementById("cube-canvas");
    const ctx = canvas.getContext("2d", { alpha: false });
    const status = document.getElementById("status");
    const summary = document.getElementById("summary");
    let state = createPhysicsCubeState(fallbackDescriptor);
    let latestSnapshot = snapshotPhysicsCube(state);
    let latestRenderProof = null;
    let resetRequested = false;
    let kickRequested = false;
    let lastTime = 0;

    window.NexusCubeApp = {
      ready: false,
      snapshot: () => ({ ...latestSnapshot, render: latestRenderProof }),
      reset: () => {
        resetRequested = true;
      },
      kick: () => {
        kickRequested = true;
      }
    };

    async function loadJson(path, fallback) {
      try {
        const response = await fetch(path, { cache: "no-store" });
        if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
        return await response.json();
      } catch (error) {
        status.textContent = `using fallback physics descriptor: ${error.message}`;
        return fallback;
      }
    }

    function resize() {
      const ratio = Math.max(1, window.devicePixelRatio || 1);
      const width = Math.max(720, Math.floor(canvas.clientWidth * ratio));
      const height = Math.max(420, Math.floor(canvas.clientHeight * ratio));
      if (canvas.width !== width || canvas.height !== height) {
        canvas.width = width;
        canvas.height = height;
      }
    }

    function polygon(points, fill, stroke) {
      ctx.beginPath();
      ctx.moveTo(points[0][0], points[0][1]);
      for (const point of points.slice(1)) ctx.lineTo(point[0], point[1]);
      ctx.closePath();
      ctx.fillStyle = fill;
      ctx.fill();
      ctx.strokeStyle = stroke;
      ctx.lineWidth = 3;
      ctx.stroke();
    }

    function polygonArea(points) {
      let area = 0;
      for (let index = 0; index < points.length; index += 1) {
        const current = points[index];
        const next = points[(index + 1) % points.length];
        area += current[0] * next[1] - next[0] * current[1];
      }
      return area / 2;
    }

    function rotateY(vertex, angle) {
      const cos = Math.cos(angle);
      const sin = Math.sin(angle);
      return [
        vertex[0] * cos - vertex[2] * sin,
        vertex[1],
        vertex[0] * sin + vertex[2] * cos
      ];
    }

    function faceFill(face, material) {
      if (face.materialSlot === "top") return material.highlightColor;
      if (face.materialSlot === "front") return material.color;
      return material.sideColor;
    }

    function buildCubeRender(snapshot, centerX, centerY, scale) {
      const mesh = snapshot.cube.mesh || createPrimitiveCubeMesh(snapshot.cube.size);
      const angle = snapshot.cube.rotation[1] * Math.PI / 180;
      const facingFront = Math.cos(angle) >= 0;
      const sideFace = Math.sin(angle) >= 0 ? "right" : "left";
      const depthFace = facingFront ? "front" : "back";
      const faceOrder = ["top", sideFace, depthFace];
      const faceByName = new Map(mesh.faces.map((face) => [face.name, face]));
      const vertices = mesh.vertices.map((vertex) => rotateY(vertex, angle));

      const faces = faceOrder
        .map((name) => faceByName.get(name))
        .filter(Boolean)
        .map((face) => {
          const points = face.vertices.map((vertexIndex) => {
            const vertex = vertices[vertexIndex];
            return [
              centerX + vertex[0] * scale + vertex[2] * scale * 0.34,
              centerY - vertex[1] * scale + vertex[2] * scale * 0.28
            ];
          });
          return { face, points, area: Math.abs(polygonArea(points)) };
        });

      return {
        faces,
        proof: {
          schema: "nexus.cube-render-proof.v1",
          meshSource: mesh.schema,
          meshWindingValid: mesh.windingValidation?.valid === true,
          meshCheckedTriangles: mesh.windingValidation?.checkedTriangles || 0,
          drawnFaces: faces.map(({ face }) => face.name),
          faceAreas: Object.fromEntries(faces.map(({ face, area }) => [face.name, Number(area.toFixed(2))])),
          minimumFaceArea: Number(Math.min(...faces.map(({ area }) => area)).toFixed(2))
        }
      };
    }

    function drawWorld(snapshot) {
      resize();
      const width = canvas.width;
      const height = canvas.height;
      const floorY = height * 0.74;
      const x = width * 0.5 + snapshot.cube.position[0] * width * 0.12;
      const y = floorY - (snapshot.cube.position[1] - snapshot.physics.floorY) * height * 0.17;
      const scale = Math.min(width, height) * 0.16;
      const cubeVisualScale = scale * snapshot.cube.size;

      const sky = ctx.createLinearGradient(0, 0, 0, height);
      sky.addColorStop(0, "#163548");
      sky.addColorStop(0.62, "#2a5162");
      sky.addColorStop(0.63, "#18301e");
      sky.addColorStop(1, "#07100a");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, width, height);

      ctx.fillStyle = "rgba(10, 14, 12, 0.78)";
      ctx.fillRect(0, floorY, width, height - floorY);
      ctx.strokeStyle = "rgba(220,255,226,0.18)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, floorY);
      ctx.lineTo(width, floorY);
      ctx.stroke();
      for (let i = -6; i <= 6; i += 1) {
        ctx.beginPath();
        ctx.moveTo(width * 0.5 + i * cubeVisualScale * 0.36, floorY);
        ctx.lineTo(width * 0.5 + i * cubeVisualScale * 0.92, height);
        ctx.stroke();
      }

      const shadowScale = Math.max(0.22, 1 - snapshot.cube.position[1] * 0.16);
      ctx.fillStyle = "rgba(0,0,0,0.34)";
      ctx.beginPath();
      ctx.ellipse(x, floorY + cubeVisualScale * 0.16, cubeVisualScale * shadowScale, cubeVisualScale * 0.2 * shadowScale, 0, 0, Math.PI * 2);
      ctx.fill();

      const render = buildCubeRender(snapshot, x, y, scale);
      const { edgeColor } = snapshot.cube.material;
      for (const { face, points } of render.faces) {
        polygon(points, faceFill(face, snapshot.cube.material), edgeColor);
      }

      ctx.fillStyle = "rgba(255,255,255,0.2)";
      const frontFace = render.faces.find(({ face }) => face.name === "front");
      if (frontFace) {
        const left = Math.min(...frontFace.points.map((point) => point[0]));
        const top = Math.min(...frontFace.points.map((point) => point[1]));
        const width = Math.max(...frontFace.points.map((point) => point[0])) - left;
        const height = Math.max(...frontFace.points.map((point) => point[1])) - top;
        ctx.fillRect(left + 10, top + 10, width * 0.46, height * 0.12);
      }

      return render.proof;
    }

    function frame(time) {
      const dt = lastTime ? (time - lastTime) / 1000 : 1 / 60;
      lastTime = time;
      latestSnapshot = tickPhysicsCube(state, {
        reset: resetRequested,
        reason: resetRequested ? "button-reset" : undefined,
        impulse: kickRequested ? [1.3, 4.4, 0] : undefined
      }, dt);
      resetRequested = false;
      kickRequested = false;
      latestRenderProof = drawWorld(latestSnapshot);
      summary.textContent = latestSnapshot.summary;
      requestAnimationFrame(frame);
    }

    document.getElementById("reset-cube").addEventListener("click", () => {
      resetRequested = true;
    });
    document.getElementById("kick-cube").addEventListener("click", () => {
      kickRequested = true;
    });

    const descriptor = await loadJson("./objects/physics-cube.json", fallbackDescriptor);
    state = createPhysicsCubeState(descriptor);
    latestSnapshot = snapshotPhysicsCube(state);
    window.NexusCubeApp.ready = true;
    status.textContent = "physics composition ready: primitive-cube-object-kit + physics-cube-object-kit";
    requestAnimationFrame(frame);
  </script>
</body>
</html>
